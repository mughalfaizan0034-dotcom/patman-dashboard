name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject SCRIPT_URL
        env:
          SCRIPT_URL: ${{ secrets.SCRIPT_URL }}
        run: |
          echo "Injecting SCRIPT_URL..."
          sed -i "s|__SCRIPT_URL__|${SCRIPT_URL}|g" index.html
          if grep -q "__SCRIPT_URL__" index.html; then
            echo "ERROR: Placeholder still present - check SCRIPT_URL secret is set"
            exit 1
          else
            echo "SUCCESS: SCRIPT_URL injected OK"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
